services:
  backend:
    build: ./lean-agent
    container_name: lean-agent-backend
    ports:
      - "8000:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    volumes:
      - ./lean-agent/src:/app/src
      - ${HOME}/.lean-agent:/root/.lean-agent
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  frontend:
    build: ./lean-agent-ui
    container_name: lean-agent-frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_PROXY_TARGET: http://backend:8000
    volumes:
      - ./lean-agent-ui/src:/app/src
      - ./lean-agent-ui/index.html:/app/index.html
      - ./lean-agent-ui/vite.config.ts:/app/vite.config.ts
    depends_on:
      backend:
        condition: service_healthy
